baseURL: "https://Sun216-Dps.github.io/"
languageCode: "zh-CN"
title: "Sun216 · 个人小站"
theme: "PaperMod"

params:
  # 个人信息（先填占位，你之后改）
  author: "Sun216"
  description: "经济学 · 文旅融合 研究笔记"

  # PaperMod 配置
  ShowReadingTime: true
  ShowShareButtons: false
  ShowPostNavLinks: true
  ShowBreadCrumbs: true
  ShowCodeCopyButtons: true
  hideSummary: false

  # 首页
  profileMode:
    enabled: true
    title: "Hello, I'm Sun216 👋"
    subtitle: "经济学研究者 | 文旅融合方向"
    # 头像（之后可加）
    # imageUrl: "/avatar.jpg"

  # 社交链接
  socialIcons:
    - name: "github"
      url: "https://github.com/Sun216-Dps"

  # 导航
  mainSections: ["posts"]

menu:
  main:
    - identifier: "about"
      name: "About"
      url: "/about/"
      weight: 10
    - identifier: "posts"
      name: "Posts"
      url: "/posts/"
      weight: 20

# 启用 emoji
enableEmoji: true
